<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>PSR Assessment Platform — Multi-institutional Biosafety</title>
<meta name="description" content="PSR biosafety assessment platform with persistent storage, audit trail, and inter-rater reliability analysis.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafaf8;--card:#fff;--bg2:#f5f5f0;--bg3:#eeedfe;--text:#222;--text2:#666;--text3:#999;--border:#e0ddd4;--accent:#534ab7;--accent-bg:#eeedfe;--green:#1d9e75;--green-bg:#eaf3de;--green-text:#3b6d11;--amber-bg:#faeeda;--amber-text:#854f0b;--red-bg:#fcebeb;--red-text:#a32d2d;--blue-bg:#e6f1fb;--blue-text:#0c447c;--purple-bg:#eeedfe;--purple-text:#534ab7;--teal-bg:#e1f5ee;--teal-text:#085041;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--card:#222220;--bg2:#2a2a28;--bg3:#2d2b3d;--text:#e0ddd4;--text2:#a0a098;--text3:#706f6a;--border:#3a3a38;--accent:#afa9ec;--accent-bg:#2d2b3d;--green-bg:#1a2a10;--green-text:#97c459;--amber-bg:#2a1f08;--amber-text:#f0c060;--red-bg:#2a1010;--red-text:#f09595;--blue-bg:#0a1a2a;--blue-text:#85b7eb;--purple-bg:#2d2b3d;--purple-text:#cecbf6;--teal-bg:#0a2a20;--teal-text:#5dcaa5}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:16px}
.wrap{max-width:800px;margin:0 auto}
h1{font-size:22px;font-weight:600}
h2{font-size:17px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:20px 24px;margin-bottom:16px}
.pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:500}
.p-green{background:var(--green-bg);color:var(--green-text)}.p-amber{background:var(--amber-bg);color:var(--amber-text)}.p-red{background:var(--red-bg);color:var(--red-text)}.p-blue{background:var(--blue-bg);color:var(--blue-text)}.p-purple{background:var(--purple-bg);color:var(--purple-text)}.p-gray{background:var(--bg2);color:var(--text2)}.p-teal{background:var(--teal-bg);color:var(--teal-text)}
.steps-bar{display:flex;gap:3px;align-items:center;margin:12px 0 16px}
.sd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;cursor:pointer;transition:.2s}
.sd.done{background:var(--green);color:#fff}.sd.on{background:var(--accent);color:#fff}.sd.off{background:var(--bg2);color:var(--text3)}
.sl{flex:1;height:2px;border-radius:1px}.sl.done{background:#9fe1cb}.sl.off{background:var(--border)}
.opt-g{display:grid;gap:8px}.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}
.opt{padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;text-align:left;font-size:13px;background:transparent;color:var(--text);transition:.15s}
.opt.sel{border:2px solid var(--accent);background:var(--accent-bg)}
.opt b{font-weight:500;display:block}.opt small{font-size:11px;color:var(--text2)}
input[type=text],input[type=date],textarea,select{width:100%;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;font-family:inherit;background:var(--card);color:var(--text);resize:vertical}
.fl{margin-bottom:14px}.fl label{font-size:13px;font-weight:500;display:block;margin-bottom:6px}
.btn{padding:10px 20px;border-radius:var(--r);font-size:14px;cursor:pointer;border:none;transition:.15s;display:inline-block}
.btn:disabled{opacity:.4;cursor:default}
.bo{background:transparent;border:1px solid var(--border);color:var(--text)}
.bp{background:var(--accent);color:#fff;font-weight:500}
.bs{background:var(--green);color:#fff;font-weight:500}
.bd{background:var(--red-bg);color:var(--red-text)}
.metric{flex:1;padding:12px;border-radius:var(--r);text-align:center;background:var(--bg2)}
.mv{font-size:22px;font-weight:500}.ml{font-size:11px;color:var(--text2)}
.alert-metric{background:var(--red-bg)}.alert-metric .mv{color:var(--red-text)}
.note{padding:12px;border-radius:var(--r);font-size:13px;margin-top:10px}
.n-pur{background:var(--accent-bg);color:var(--purple-text)}.n-amb{background:var(--amber-bg);color:var(--amber-text)}.n-red{background:var(--red-bg);color:var(--red-text)}.n-teal{background:var(--teal-bg);color:var(--teal-text)}
.mod-row{display:grid;grid-template-columns:110px 1fr;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.mod-btn{flex:1;padding:4px 5px;border-radius:6px;cursor:pointer;font-size:10px;text-align:center;border:1px solid var(--border);background:transparent;color:var(--text);line-height:1.2;transition:.15s}
.mod-btn.sel{border:2px solid var(--accent)}.mod-btn.sf{background:var(--green-bg)}.mod-btn.su{background:var(--red-bg)}
.nav{display:flex;justify-content:space-between;margin-top:12px;gap:8px}
.matrix{width:100%;border-collapse:collapse;font-size:13px}
.matrix th,.matrix td{padding:8px;border-bottom:1px solid var(--border)}
.matrix th{font-weight:500}.matrix .hi{background:var(--accent-bg);font-weight:600;border:2px solid var(--accent);border-radius:4px}
.toast{position:fixed;top:16px;right:16px;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:opacity .3s}
.home-btn{padding:6px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-size:12px;text-decoration:none;display:inline-block;margin-bottom:16px}
@media print{.nav,.steps-bar,.btn,.toast,.home-btn{display:none}.card{break-inside:avoid;border:1px solid #ccc}}
@media(max-width:600px){.c2,.c3{grid-template-columns:1fr}.mod-row{grid-template-columns:1fr}}
</style>
</head>

// Algorithm
function cPSR(ae,vo,co){const s={l:0,m:0,h:0};[ae,vo,co].forEach(v=>{if(v==="low")s.l++;else if(v==="moderate")s.m++;else if(v==="high")s.h++});if(s.h>=2||(s.h>=1&&s.m>=1))return"High";if(s.m>=2||(s.h===1&&s.l>=2))return"Moderate";return"Low"}
function compute(d){
  const erg=d.rgOverride||((d.isGMO&&d.replComp==="no"&&d.riskGroup==="RG3")?"RG3*":d.riskGroup);
  const pp=(d.procedures||[]).map(p=>p.aerosol&&p.volume&&p.concentration?cPSR(p.aerosol,p.volume,p.concentration):null);
  const O={Low:0,Moderate:1,High:2};
  const mx=pp.reduce((m,p)=>p&&O[p]>O[m]?p:m,"Low");
  const u=Object.values(d.modFactors||{}).filter(v=>v==="increase").length;
  const f=Object.values(d.modFactors||{}).filter(v=>v==="decrease").length;
  let ap=mx;if(u>=2&&mx==="Low")ap="Moderate";if(u>=2&&mx==="Moderate")ap="High";
  const bsl=erg?(BSL[erg]?.[ap]||"—"):"—";
  return{erg,pp,mx,ap,u,f,bsl};
}

// IRR
function rIRR(){
  const all=assessments.filter(a=>a.status==="final");
  const grouped={};
  all.forEach(a=>{const k=(a.agentName||"").toLowerCase().trim();if(!k)return;if(!grouped[k])grouped[k]=[];grouped[k].push(a)});
  const pairs=Object.entries(grouped).filter(([_,v])=>v.length>1);
  
  let agreements=0,total=0;
  pairs.forEach(([_,g])=>{for(let i=0;i<g.length;i++)for(let j=i+1;j<g.length;j++){total++;if(compute(g[i]).bsl===compute(g[j]).bsl)agreements++}});
  const rate=total>0?Math.round(agreements/total*100):0;

  let h=`<button class="btn bo" onclick="view='dash';R()" style="margin-bottom:16px">${t("dashBtn")}</button>`;
  h+=`<h1>${t("irrTitle")}</h1><p class="sub">${t("irrSub")}</p>`;
  
  if(total>0){
    h+=`<div style="display:flex;gap:12px;margin-bottom:20px">`;
    h+=`<div class="metric ${rate<80?"alert-metric":""}"><div class="mv">${rate}%</div><div class="ml">${t("agreementRate")}</div></div>`;
    h+=`<div class="metric"><div class="mv">${agreements}</div><div class="ml">${t("concordantPairs")}</div></div>`;
    h+=`<div class="metric"><div class="mv">${total}</div><div class="ml">${t("totalComparisons")}</div></div></div>`;
  }

  if(pairs.length===0)h+=`<div class="card"><p style="font-size:13px;color:var(--text2);padding:16px 0">${t("irrNoData")}</p></div>`;
  else pairs.forEach(([_,g])=>{
    h+=`<div class="card"><h2>${esc(g[0].agentName)}</h2><p class="sub">${g.length} ${t("assessmentsFrom")} ${new Set(g.map(a=>a.reviewer||a.institution)).size} ${t("evaluators")}</p>`;
    g.forEach(a=>{const c=compute(a);
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-radius:var(--r);margin-bottom:6px;font-size:13px">
        <div style="flex:1"><b>${esc(a.reviewer||t("anon"))}</b><div style="font-size:11px;color:var(--text2)">${esc(a.institution)} · ${(a.updatedAt||"").slice(0,10)}</div></div>
        <span class="pill p-gray">${c.erg}</span> ${pp(c.ap)} ${bp(c.bsl)}</div>`;
    });
    const bsls=g.map(a=>compute(a).bsl);const ok=bsls.every(b=>b===bsls[0]);
    h+=`<div class="note ${ok?"n-teal":"n-red"}">${ok?`${t("fullAgreement")} ${bsls[0]}`:`${t("discrepancy")} ${[...new Set(bsls)].join(" vs ")}`}</div></div>`;
  });
  return h;
}

function reportModel(){
  const c=compute(cur);
  const erg=c.erg,bsl=c.bsl,mx=c.mx,adj=c.ap,u=c.u,f=c.f,psrs=c.pp;
  const ctrl=CTRL[bsl]||CTRL["BSL-2"];
  const now=new Date();
  const rid="PSR-"+(cur.reviewDate||now.toISOString().slice(0,10))+"-"+Math.random().toString(36).slice(2,6).toUpperCase();
  const S=[];

  const b1=[{type:"kv",k:p("Biological agent","Agente biológico"),v:cur.agentName||"—"},
            {type:"kv",k:p("Risk Group","Grupo de Riesgo"),v:cur.riskGroup||"—"},
            {type:"kv",k:p("Effective RG","GR efectivo"),v:erg||"—"}];
  if(cur.isGMO){
    b1.push({type:"kv",k:p("GMO","OMG"),v:"Yes / Sí"});
    b1.push({type:"kv",k:p("Parental organism","Organismo parental"),v:cur.parentalOrg||"—"});

  } else b1.push({type:"kv",k:p("GMO","OMG"),v:"No"});
  if(erg==="RG3*")b1.push({type:"note",en:RG3STAR.en,es:RG3STAR.es});
  S.push({title:p("1. Agent & classification","1. Agente y clasificación"),body:b1});

  const procs=[];
  cur.procedures.forEach((pr,idx)=>{if(pr.name)procs.push({n:procs.length+1,name:pr.name,psr:psrs[idx]||"—",aer:LVL(pr.aerosol),vol:LVL(pr.volume),conc:LVL(pr.concentration)});});
  S.push({title:p("2. Procedures","2. Procedimientos"),body:[{type:"procs",items:procs.length?procs:null}]});

  const factors=MF.map(fc=>{const v=cur.modFactors[fc.id];const d=v==="increase"?fc.inc:v==="decrease"?fc.dec:fc.neu;return{label:fc.l,status:FSTAT(v),desc:d};});
  const escalated=adj!==mx;
  const escNote=escalated
    ? p("Escalation rule applied: ≥2 unfavorable factors → PSR escalated from "+mx+" to "+adj+".","Regla de escalación aplicada: ≥2 factores desfavorables → PSR escalado de "+PSRW(mx).es+" a "+PSRW(adj).es+".")
    : p("No escalation: fewer than 2 unfavorable factors (or maximum PSR already High).","Sin escalación: menos de 2 factores desfavorables (o PSR máximo ya Alto).");
  S.push({title:p("3. PSR determination","3. Determinación del PSR"),body:[
    {type:"kv",k:p("Maximum PSR","PSR máximo"),v:PSRW(mx).en+" / "+PSRW(mx).es},
    {type:"factors",items:factors},
    {type:"kv",k:p("Unfavorable factors","Factores desfavorables"),v:String(u)},
    {type:"kv",k:p("Favorable factors","Factores favorables"),v:String(f)},
    {type:"note",en:escNote.en,es:escNote.es},
    {type:"kv",k:p("Adjusted PSR","PSR ajustado"),v:PSRW(adj).en+" / "+PSRW(adj).es},
  ]});

  const b4=[{type:"kv",k:p("Matrix cell","Celda de la matriz"),v:(erg||"—")+" × "+PSRW(adj).en+"/"+PSRW(adj).es+" PSR"},
            {type:"kv",k:p("Assigned BSL","NCB asignado"),v:bsl}];
  if(erg==="RG3*"&&bsl.indexOf("BSL-2+")>-1)b4.push({type:"note",en:RG3STAR.en,es:RG3STAR.es});
  S.push({title:p("4. BSL assignment","4. Asignación de NCB"),body:b4});

  S.push({title:p("5. Recommended controls","5. Controles recomendados"),body:[
    {type:"sub",k:p("Engineering controls","Controles de ingeniería")},{type:"list",items:(ctrl.e||[])},
    {type:"sub",k:p("Personal protective equipment (PPE)","Equipo de protección individual (EPI)")},{type:"list",items:(ctrl.p||[])},
    {type:"note",en:T.respNote.en,es:T.respNote.es},
    {type:"sub",k:p("Administrative controls","Controles administrativos")},{type:"list",items:(ctrl.a||[])},
    {type:"sub",k:p("Decontamination & waste inactivation","Descontaminación e inactivación de residuos")},{type:"list",items:deconBil(bsl)},
    ...(cur.addCtrl?[{type:"sub",k:p("Additional controls","Controles adicionales")},{type:"text",v:cur.addCtrl}]:[]),
  ]});

  S.push({title:p("6. Justification","6. Justificación"),body:[{type:"text",v:cur.justification||"—"}]});

  S.push({title:p("7. Documentation & review","7. Documentación y revisión"),body:[
    {type:"kv",k:p("Assessor","Evaluador"),v:cur.reviewer||"—"},
    {type:"kv",k:p("Institution","Institución"),v:cur.institution||"—"},
    {type:"kv",k:p("Date","Fecha"),v:cur.reviewDate||"—"},
    {type:"kv",k:p("Status","Estado"),v:cur.status==="final"?"Final / Final":"Draft / Borrador"},
    {type:"kv",k:p("Review triggers","Desencadenantes de revisión"),v:cur.triggers||"—"},
  ]});

  return {meta:{version:REPORT_VERSION,generated:now.toISOString().slice(0,19).replace("T"," "),rid},sections:S};
}

function rwrap(s,ind){s=String(s);const max=72-ind.length;const words=s.split(/\s+/);let line="",out=[];words.forEach(w=>{if((line+" "+w).trim().length>max){out.push(ind+line.trim());line=w;}else line+=" "+w;});if(line.trim())out.push(ind+line.trim());return out.join("\n");}

function reportTXT(M){
  let r="PSR BIOSAFETY ASSESSMENT REPORT  /  INFORME DE EVALUACIÓN DE BIOSEGURIDAD PSR\n"+"=".repeat(76)+"\n";
  r+="Tool / Herramienta: PSR v"+M.meta.version+"    Report ID: "+M.meta.rid+"\n";
  r+="Generated / Generado: "+M.meta.generated+" UTC\n";
  M.sections.forEach(sec=>{
    r+="\n"+sec.title.en.toUpperCase()+"  /  "+sec.title.es.toUpperCase()+"\n"+"-".repeat(76)+"\n";
    sec.body.forEach(b=>{
      if(b.type==="kv") r+="  "+b.k.en+" / "+b.k.es+": "+b.v+"\n";
      else if(b.type==="sub") r+="  "+b.k.en+" / "+b.k.es+":\n";
      else if(b.type==="text") r+=rwrap(b.v||"—","  ")+"\n";
      else if(b.type==="note") r+=rwrap("⚠ "+b.en,"  ")+"\n"+rwrap(b.es,"     ")+"\n";
      else if(b.type==="list"){ if(b.items) b.items.forEach(it=>{r+="  • "+LE(it)+"\n"+rwrap((it.es||it.en||""),"      ")+"\n"}); }
      else if(b.type==="factors") b.items.forEach(it=>{r+="  • "+it.label.en+" / "+it.label.es+" → "+it.status.en+" / "+it.status.es+"  ("+it.desc.en+" / "+it.desc.es+")\n"});
      else if(b.type==="procs"){ if(!b.items){r+="  —\n";} else b.items.forEach(it=>{r+="  "+it.n+". "+it.name+"\n      → "+it.psr+" PSR  ·  Aerosol "+it.aer.en+"/"+it.aer.es+"  ·  Vol "+it.vol.en+"/"+it.vol.es+"  ·  Conc "+it.conc.en+"/"+it.conc.es+"\n"}); }
    });
  });
  r+="\nSIGN-OFF / FIRMAS\n"+"-".repeat(76)+"\n";
  r+="  Assessor / Evaluador: ____________________________   Date / Fecha: ____________\n\n";
  r+="  Biosafety Officer / Responsable de Bioseguridad: ____________________   Date / Fecha: ____________\n";
  r+="\n"+"=".repeat(76)+"\n";
  r+="Framework reference / Referencia del marco:\n  "+CIT+"\n";
  r+="Regulatory basis / Base regulatoria:\n  "+REGBASIS+"\n";
  r+="\n"+DISC.en+"\n"+DISC.es+"\n";
  r+="https://rafael-67.github.io/psr-tool/\n";
  return r;
}

function s_(x){return String(x==null?"":x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function reportHTML(M){
  const sec=M.sections.map(s=>{
    let inner="";
    s.body.forEach(b=>{
      if(b.type==="kv") inner+='<div class="row"><div class="k">'+s_(b.k.en)+' <i>/ '+s_(b.k.es)+'</i></div><div class="v">'+esc(b.v)+'</div></div>';
      else if(b.type==="sub") inner+="<h3>"+s_(b.k.en)+" <i>/ "+s_(b.k.es)+"</i></h3>";
      else if(b.type==="text") inner+='<p class="free">'+esc(b.v||"—").replace(/\n/g,"<br>")+"</p>";
      else if(b.type==="note") inner+='<div class="note">'+s_(b.en)+"<br><i>"+s_(b.es)+"</i></div>";
      else if(b.type==="list"){ inner+="<ul>"+((b.items||[]).map(it=>"<li>"+s_(LE(it))+"<br><i>"+s_(it.es||it.en||"")+"</i></li>").join(""))+"</ul>"; }
      else if(b.type==="factors"){ inner+='<table class="fct"><thead><tr><th>Factor</th><th>Status / Estado</th><th>Detail / Detalle</th></tr></thead><tbody>'+b.items.map(it=>"<tr><td>"+s_(it.label.en)+" <i>/ "+s_(it.label.es)+'</i></td><td class="st-'+it.status.en.toLowerCase()+'">'+s_(it.status.en)+" / "+s_(it.status.es)+"</td><td>"+s_(it.desc.en)+" / "+s_(it.desc.es)+"</td></tr>").join("")+"</tbody></table>"; }
      else if(b.type==="procs"){ inner+=b.items?('<table class="prc"><thead><tr><th>#</th><th>Procedure / Procedimiento</th><th>PSR</th><th>Aerosol</th><th>Vol</th><th>Conc</th></tr></thead><tbody>'+b.items.map(it=>"<tr><td>"+it.n+"</td><td>"+esc(it.name)+"</td><td><b>"+it.psr+"</b></td><td>"+s_(it.aer.en)+"/"+s_(it.aer.es)+"</td><td>"+s_(it.vol.en)+"/"+s_(it.vol.es)+"</td><td>"+s_(it.conc.en)+"/"+s_(it.conc.es)+"</td></tr>").join("")+"</tbody></table>"):'<p class="free">—</p>'; }
    });
    return "<section><h2>"+s_(s.title.en)+" <i>/ "+s_(s.title.es)+"</i></h2>"+inner+"</section>";
  }).join("");
  const css="@page{size:A4;margin:18mm 16mm}*{box-sizing:border-box}body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;font-size:11px;line-height:1.5;margin:0}h1{font-size:17px;margin:0 0 2px}h2{font-size:12.5px;color:#534ab7;border-bottom:1.5px solid #534ab7;padding-bottom:2px;margin:14px 0 6px}h3{font-size:11px;margin:8px 0 3px;color:#333}h2 i,h3 i,.k i{font-weight:400;color:#777;font-style:italic}.meta{font-size:10px;color:#666;border-bottom:1px solid #ccc;padding-bottom:6px;margin-bottom:4px}.row{display:flex;gap:8px;padding:1.5px 0}.k{flex:0 0 38%;color:#444}.v{flex:1;font-weight:500}.free{white-space:pre-wrap;background:#f6f6f3;border-left:2px solid #ccc;padding:6px 8px;margin:3px 0}ul{margin:2px 0 6px 16px;padding:0}li{margin:1px 0}li i,.note i,.v i{color:#777;font-style:italic}.note{background:#faf4e8;border-left:2px solid #d8a73a;padding:5px 8px;margin:4px 0}table{width:100%;border-collapse:collapse;margin:4px 0;font-size:10px}th,td{border:1px solid #ddd;padding:3px 5px;text-align:left;vertical-align:top}th{background:#eeedfe;color:#444;font-weight:600}.st-unfavorable{color:#a32d2d;font-weight:600}.st-favorable{color:#3b6d11}.signoff{margin-top:16px;border-top:1px solid #ccc;padding-top:10px}.sigline{margin:14px 0 2px}.sigbox{display:inline-block;border-bottom:1px solid #333;min-width:230px}.footer{margin-top:14px;border-top:2px solid #534ab7;padding-top:6px;font-size:9px;color:#555}.footer b{color:#333}.disc{font-style:italic;margin-top:4px}";
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+M.meta.rid+"</title><style>"+css+'</style></head><body onload="window.print()">'
    +'<h1>PSR Biosafety Assessment Report <i style="font-weight:400;color:#777;font-size:12px">/ Informe de evaluación de bioseguridad PSR</i></h1>'
    +'<div class="meta">PSR v'+M.meta.version+" &nbsp;·&nbsp; Report ID: "+M.meta.rid+" &nbsp;·&nbsp; Generated / Generado: "+M.meta.generated+" UTC</div>"
    +sec
    +'<div class="signoff"><div class="sigline">Assessor / Evaluador: <span class="sigbox"></span> &nbsp;&nbsp; Date / Fecha: <span class="sigbox" style="min-width:120px"></span></div>'
    +'<div class="sigline">Biosafety Officer / Responsable de Bioseguridad: <span class="sigbox"></span> &nbsp;&nbsp; Date / Fecha: <span class="sigbox" style="min-width:120px"></span></div></div>'
    +'<div class="footer"><b>Framework reference / Referencia del marco:</b> '+s_(CIT)+"<br><b>Regulatory basis / Base regulatoria:</b> "+s_(REGBASIS)
    +'<div class="disc">'+s_(DISC.en)+"<br>"+s_(DISC.es)+"</div>https://rafael-67.github.io/psr-tool/</div></body></html>";
}

window.exportTXT=function(){
  const r=reportTXT(reportModel());
  const b=new Blob([r],{type:"text/plain;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(b);
  a.download=`PSR_${(cur.agentName||"report").replace(/\s+/g,"_").slice(0,40)}_${cur.reviewDate||"undated"}.txt`;a.click();URL.revokeObjectURL(a.href)
};
window.printReport=function(){
  const html=reportHTML(reportModel());
  const w=window.open("","_blank");
  if(!w){toast(lang==="es"?"Permita las ventanas emergentes para el PDF":"Allow pop-ups to generate the PDF","error");return;}
  w.document.open();w.document.write(html);w.document.close();
};
