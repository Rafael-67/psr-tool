<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSR Biosafety Assessment Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f5f0;--bg3:#eeedfe;--text:#222;--text2:#666;--text3:#999;--border:#ddd;--accent:#534ab7;--accent-bg:#eeedfe;--green-bg:#eaf3de;--green-text:#3b6d11;--amber-bg:#faeeda;--amber-text:#854f0b;--red-bg:#fcebeb;--red-text:#a32d2d;--blue-bg:#e6f1fb;--blue-text:#0c447c;--purple-bg:#eeedfe;--purple-text:#3c3489;--teal-bg:#e1f5ee;--teal-text:#085041;--radius:8px;--radius-lg:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#2a2a28;--bg3:#2d2b3d;--text:#e0ddd4;--text2:#a0a098;--text3:#706f6a;--border:#3a3a38;--accent:#afa9ec;--accent-bg:#2d2b3d;--green-bg:#1a2a10;--green-text:#97c459;--amber-bg:#2a1f08;--amber-text:#f0c060;--red-bg:#2a1010;--red-text:#f09595;--blue-bg:#0a1a2a;--blue-text:#85b7eb;--purple-bg:#2d2b3d;--purple-text:#cecbf6;--teal-bg:#0a2a20;--teal-text:#5dcaa5}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:16px}
.wrap{max-width:760px;margin:0 auto}
h1{font-size:22px;font-weight:600}
h2{font-size:17px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px}
.pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:500}
.pill-green{background:var(--green-bg);color:var(--green-text)}
.pill-amber{background:var(--amber-bg);color:var(--amber-text)}
.pill-red{background:var(--red-bg);color:var(--red-text)}
.pill-blue{background:var(--blue-bg);color:var(--blue-text)}
.pill-purple{background:var(--purple-bg);color:var(--purple-text)}
.pill-teal{background:var(--teal-bg);color:var(--teal-text)}
.pill-gray{background:var(--bg2);color:var(--text2)}
.steps-bar{display:flex;gap:4px;align-items:center;margin:16px 0}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;transition:all .2s}
.step-dot.done{background:#1d9e75;color:#fff}
.step-dot.active{background:var(--accent);color:#fff}
.step-dot.pending{background:var(--bg2);color:var(--text3)}
.step-line{flex:1;height:2px;border-radius:1px;transition:background .2s}
.step-line.done{background:#9fe1cb}
.step-line.pending{background:var(--border)}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:4px 10px;border-radius:6px;font-size:11px;border:none;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s}
.tab.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.opt-grid{display:grid;gap:8px}
.opt-grid.c2{grid-template-columns:1fr 1fr}
.opt-grid.c3{grid-template-columns:1fr 1fr 1fr}
.opt{padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;text-align:left;font-size:13px;background:transparent;color:var(--text);transition:all .15s}
.opt.selected{border:2px solid var(--accent);background:var(--accent-bg)}
.opt-label{font-weight:500}
.opt-desc{font-size:11px;color:var(--text2);margin-top:2px}
input[type=text],input[type=date],textarea{width:100%;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);resize:vertical}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--accent)}
.field{margin-bottom:14px}
.field-label{font-size:13px;font-weight:500;display:block;margin-bottom:6px}
.check-label{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:6px 10px;border-radius:6px;background:var(--bg2)}
.note{padding:12px 16px;border-radius:var(--radius);font-size:13px;margin-top:12px}
.note-purple{background:var(--purple-bg);color:var(--purple-text)}
.note-amber{background:var(--amber-bg);color:var(--amber-text)}
.note-red{background:var(--red-bg);color:var(--red-text)}
.note-teal{background:var(--teal-bg);color:var(--teal-text)}
.proc-block{padding:16px;background:var(--bg2);border-radius:var(--radius);margin-bottom:12px}
.nav{display:flex;justify-content:space-between;margin-top:16px}
.btn{padding:10px 20px;border-radius:var(--radius);font-size:14px;cursor:pointer;border:none;transition:all .15s}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;font-weight:500}
.btn-primary:disabled{background:var(--border);color:var(--text3);cursor:default}
.btn-export{background:#1d9e75;color:#fff;font-weight:500;width:100%;margin-top:16px;padding:14px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px}
.summary-grid .lbl{color:var(--text2)}
.matrix{width:100%;border-collapse:collapse;font-size:13px}
.matrix th,.matrix td{padding:10px 8px;border-bottom:1px solid var(--border)}
.matrix th{text-align:center;font-weight:500}
.matrix td:first-child{font-weight:500}
.matrix td{text-align:center}
.matrix .active-cell{background:var(--accent-bg);font-weight:600;border:2px solid var(--accent);border-radius:4px}
.mod-row{display:grid;grid-template-columns:130px 1fr;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.mod-opts{display:flex;gap:6px}
.mod-opt{flex:1;padding:5px 6px;border-radius:6px;cursor:pointer;font-size:11px;text-align:center;border:1px solid var(--border);background:transparent;color:var(--text);transition:all .15s;line-height:1.3}
.mod-opt.selected{border:2px solid var(--accent)}
.mod-opt.sel-fav{background:var(--green-bg)}
.mod-opt.sel-unfav{background:var(--red-bg)}
.metric{flex:1;padding:12px;border-radius:var(--radius);text-align:center;background:var(--bg2)}
.metric-val{font-size:24px;font-weight:500}
.metric-label{font-size:12px;color:var(--text2)}
.lang-toggle{position:fixed;top:12px;right:12px;padding:4px 10px;border-radius:6px;font-size:11px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;z-index:10}
.integration{text-align:center;padding:16px;background:var(--accent-bg);border-radius:var(--radius);margin-top:16px}
.integration .eq{font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.result-big{text-align:center;padding:24px 0}
.result-big .bsl{font-size:36px;font-weight:600}
@media print{.nav,.tabs,.steps-bar,.lang-toggle,.btn-export{display:none}.card{break-inside:avoid;border:1px solid #ccc}}
@media(max-width:600px){.opt-grid.c2,.opt-grid.c3{grid-template-columns:1fr}.mod-row{grid-template-columns:1fr}.mod-opts{margin-top:4px}.summary-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<button class="lang-toggle" onclick="toggleLang()" id="langBtn">ES</button>
<div class="wrap" id="app"></div>

<script>
let lang='en',step=0;
const T={
  title:{en:'PSR biosafety assessment tool',es:'Herramienta de evaluación PSR de bioseguridad'},
  subtitle:{en:'8-step Procedure-Specific Risk framework for biosafety level assignment',es:'Framework de Riesgo Específico del Procedimiento (REP) en 8 pasos para asignación de nivel de bioseguridad'},
  steps:{en:['Agent identification','Procedure characterization','PSR classification','Modulating factors','Likelihood × Severity','BSL assignment','Control selection','Documentation'],
         es:['Identificación del agente','Caracterización del procedimiento','Clasificación PSR','Factores moduladores','Probabilidad × Severidad','Asignación NCB','Selección de controles','Documentación']},
  prev:{en:'Previous',es:'Anterior'},next:{en:'Next step',es:'Siguiente paso'},complete:{en:'Complete',es:'Completado'},
  agentName:{en:'Biological agent name',es:'Nombre del agente biológico'},
  agentPh:{en:'e.g., HIV-1 third-generation lentiviral vector',es:'ej., Vector lentiviral de tercera generación basado en HIV-1'},
  rgLabel:{en:'Risk Group classification',es:'Clasificación por Grupo de Riesgo'},
  rg1d:{en:'No/low individual or community risk',es:'Sin/bajo riesgo individual o comunitario'},
  rg2d:{en:'Moderate individual risk, low community risk',es:'Riesgo individual moderado, bajo comunitario'},
  rg3d:{en:'High individual risk, low community risk',es:'Alto riesgo individual, bajo comunitario'},
  rg4d:{en:'High individual and community risk',es:'Alto riesgo individual y comunitario'},
  isGMO:{en:'This is a genetically modified organism (GMO)',es:'Es un organismo modificado genéticamente (OMG)'},
  parentalOrg:{en:'Parental organism',es:'Organismo parental'},
  geneticMod:{en:'Genetic modification',es:'Modificación genética'},
  replComp:{en:'Replication competent?',es:'¿Competente para replicación?'},
  yes:{en:'Yes',es:'Sí'},no:{en:'No',es:'No'},
  replDefective:{en:'Replication-defective',es:'Defectivo para replicación'},
  replCompetent:{en:'Replication-competent',es:'Competente para replicación'},
  rg3star:{en:'Replication-defective GMO derived from RG3: classified as RG3* (attenuated). BSL-2+ may be permissible under documented conditions.',
           es:'OMG defectivo para replicación derivado de GR3: clasificado como GR3* (atenuado). NCB-2+ puede ser permisible bajo condiciones documentadas.'},
  procName:{en:'Procedure name',es:'Nombre del procedimiento'},
  procPh:{en:'e.g., Ultracentrifugation (25,000 rpm, 2h)',es:'ej., Ultracentrifugación (25.000 rpm, 2h)'},
  aerosol:{en:'Aerosol generation potential',es:'Potencial de generación de aerosoles'},
  aeroLow:{en:'Minimal',es:'Mínimo'},aeroMod:{en:'Moderate',es:'Moderado'},aeroHigh:{en:'High',es:'Alto'},
  volume:{en:'Working volume',es:'Volumen de trabajo'},
  conc:{en:'Concentration',es:'Concentración'},
  addProc:{en:'+ Add another procedure',es:'+ Añadir otro procedimiento'},
  remove:{en:'Remove',es:'Eliminar'},
  procedure:{en:'Procedure',es:'Procedimiento'},
  maxPSR:{en:'Maximum procedural PSR',es:'PSR procedimental máximo'},
  maxPSRnote:{en:'The highest PSR across all procedures determines the baseline for BSL assignment.',es:'El PSR más alto de todos los procedimientos determina la línea base para la asignación de NCB.'},
  incomplete:{en:'Incomplete data',es:'Datos incompletos'},
  favorable:{en:'Favorable',es:'Favorable'},neutral:{en:'Neutral',es:'Neutro'},unfavorable:{en:'Unfavorable',es:'Desfavorable'},
  unfavCount:{en:'Unfavorable',es:'Desfavorables'},favCount:{en:'Favorable',es:'Favorables'},
  escalation:{en:'≥2 unfavorable factors: BSL escalation triggered',es:'≥2 factores desfavorables: escalación de NCB activada'},
  integResult:{en:'Integration result',es:'Resultado de la integración'},
  assignedBSL:{en:'Assigned biosafety level',es:'Nivel de contención biológica asignado'},
  justification:{en:'Justification narrative',es:'Narrativa de justificación'},
  justPh:{en:'Provide the written rationale for this BSL assignment...',es:'Proporcione la justificación escrita para esta asignación de NCB...'},
  rg3starCond:{en:'BSL-2+ conditions for RG3* agents: (1) documented risk assessment, (2) IBC approval, (3) mandatory Class II BSC + double gloves + eye protection, (4) demonstrated personnel competency. Default to BSL-3 if uncertain.',
               es:'Condiciones de NCB-2+ para agentes GR3*: (1) evaluación de riesgos documentada, (2) aprobación del CBS, (3) CSB Clase II obligatoria + doble guante + protección ocular, (4) competencia del personal demostrada. NCB-3 por defecto si hay incertidumbre.'},
  engControls:{en:'Engineering controls',es:'Controles de ingeniería'},
  ppeControls:{en:'Personal protective equipment (PPE)',es:'Equipos de protección individual (EPI)'},
  adminControls:{en:'Administrative controls',es:'Controles administrativos'},
  addControls:{en:'Additional procedure-specific controls',es:'Controles adicionales específicos del procedimiento'},
  addControlsPh:{en:'Add any controls specific to your procedures...',es:'Añada controles específicos de sus procedimientos...'},
  assessor:{en:'Assessment performed by',es:'Evaluación realizada por'},
  assessDate:{en:'Assessment date',es:'Fecha de evaluación'},
  triggers:{en:'Review triggers',es:'Desencadenantes de revisión'},
  triggersPh:{en:'e.g., Agent change, procedure modification, incident, annual review...',es:'ej., Cambio de agente, modificación del procedimiento, incidente, revisión anual...'},
  summary:{en:'Assessment summary',es:'Resumen de la evaluación'},
  agent:{en:'Agent',es:'Agente'},riskGroup:{en:'Risk Group',es:'Grupo de Riesgo'},
  adjustedPSR:{en:'Adjusted PSR',es:'PSR ajustado'},bslAssigned:{en:'BSL assigned',es:'NCB asignado'},
  unfavFactors:{en:'Unfavorable factors',es:'Factores desfavorables'},
  procsEval:{en:'Procedures evaluated',es:'Procedimientos evaluados'},
  exportPDF:{en:'Export assessment report (PDF)',es:'Exportar informe de evaluación (PDF)'},
  exportTXT:{en:'Export as text',es:'Exportar como texto'},
  recControls:{en:'Recommended controls for',es:'Controles recomendados para'},
  step1sub:{en:'Determine Risk Group (RG1–4). For GMOs, evaluate parental organism + genetic modification.',es:'Determine el Grupo de Riesgo (GR1–4). Para OMGs, evalúe organismo parental + modificación genética.'},
  step2sub:{en:'List all technical procedures; identify aerosol-generating steps; estimate volumes and concentrations.',es:'Liste todos los procedimientos técnicos; identifique pasos generadores de aerosoles; estime volúmenes y concentraciones.'},
  step3sub:{en:'Each procedure is assigned Low, Moderate, or High PSR based on the classification matrix.',es:'Cada procedimiento se clasifica como PSR Bajo, Moderado o Alto según la matriz de clasificación.'},
  step4sub:{en:'Assess procedural modulators. ≥2 unfavorable factors triggers BSL escalation.',es:'Evalúe los moduladores procedimentales. ≥2 factores desfavorables activan escalación de NCB.'},
  step5sub:{en:'Risk = Hazard (agent) × Likelihood (procedure). Integrate agent RG with adjusted PSR.',es:'Riesgo = Peligrosidad (agente) × Probabilidad (procedimiento). Integre el GR del agente con el PSR ajustado.'},
  step6sub:{en:'Apply the Agent–PSR combination matrix to assign biosafety level.',es:'Aplique la matriz combinada Agente–PSR para asignar el nivel de contención biológica.'},
  step7sub:{en:'Specify engineering controls, PPE, administrative measures, and training.',es:'Especifique controles de ingeniería, EPIs, medidas administrativas y formación.'},
  step8sub:{en:'Document assessment; obtain biosafety committee approval; establish review triggers.',es:'Documente la evaluación; obtenga la aprobación del comité de bioseguridad; establezca desencadenantes de revisión.'},
};
const t=(k)=>T[k]?.[lang]||k;

const MOD_FACTORS=[
  {id:'volume',en:'Volume',es:'Volumen',inc:{en:'>100 mL',es:'>100 mL'},dec:{en:'<10 mL',es:'<10 mL'},neu:{en:'10–100 mL',es:'10–100 mL'}},
  {id:'concentration',en:'Concentration',es:'Concentración',inc:{en:'>10⁸ CFU/PFU/mL',es:'>10⁸ UFC/UFP/mL'},dec:{en:'<10⁶ CFU/PFU/mL',es:'<10⁶ UFC/UFP/mL'},neu:{en:'10⁶–10⁸',es:'10⁶–10⁸'}},
  {id:'frequency',en:'Frequency',es:'Frecuencia',inc:{en:'Daily/Weekly',es:'Diaria/Semanal'},dec:{en:'Occasional',es:'Ocasional'},neu:{en:'Monthly',es:'Mensual'}},
  {id:'aerosol',en:'Aerosol generation',es:'Generación aerosoles',inc:{en:'High (sonication)',es:'Alta (sonicación)'},dec:{en:'Minimal (pipetting)',es:'Mínima (pipeteo)'},neu:{en:'Moderate',es:'Moderada'}},
  {id:'stability',en:'Env. stability',es:'Estabilidad amb.',inc:{en:'High (AAV, spores)',es:'Alta (AAV, esporas)'},dec:{en:'Low (lentivirus)',es:'Baja (lentivirus)'},neu:{en:'Moderate',es:'Moderada'}},
  {id:'experience',en:'Operator exp.',es:'Experiencia op.',inc:{en:'<6 months',es:'<6 meses'},dec:{en:'>2 years',es:'>2 años'},neu:{en:'6m–2y',es:'6m–2a'}},
  {id:'supervision',en:'Supervision',es:'Supervisión',inc:{en:'None',es:'Ninguna'},dec:{en:'Direct, continuous',es:'Directa, continua'},neu:{en:'Periodic',es:'Periódica'}},
  {id:'infrastructure',en:'Infrastructure',es:'Infraestructura',inc:{en:'Inadequate',es:'Inadecuada'},dec:{en:'Appropriate + BSC III',es:'Adecuada + CSB III'},neu:{en:'Appropriate',es:'Adecuada'}},
  {id:'incidents',en:'Incident history',es:'Historial incid.',inc:{en:'Previous exposures',es:'Exposiciones previas'},dec:{en:'No incidents',es:'Sin incidentes'},neu:{en:'No data',es:'Sin datos'}},
];

const BSL_MATRIX={RG1:{Low:'BSL-1',Moderate:'BSL-1*',High:'BSL-2**'},RG2:{Low:'BSL-2',Moderate:'BSL-2',High:'BSL-2+'},RG3:{Low:'BSL-2+',Moderate:'BSL-3',High:'BSL-3'},'RG3*':{Low:'BSL-2+',Moderate:'BSL-2+/BSL-3',High:'BSL-3'},RG4:{Low:'BSL-4',Moderate:'BSL-4',High:'BSL-4'}};

const CONTROLS={
  'BSL-1':{eng:['Open bench','Handwashing sink'],ppe:['Lab coat','Gloves','Eye protection if splash'],admin:['Standard microbiological practices','Biohazard signage']},
  'BSL-1*':{eng:['BSC recommended for aerosol steps','Contained sonicator'],ppe:['Lab coat','Gloves','Eye protection','N95 for aerosol'],admin:['Aerosol hazard training','SOPs for high-aerosol procedures']},
  'BSL-2':{eng:['Class II BSC for aerosol procedures','Autoclave available'],ppe:['Lab coat','Gloves','Eye protection','Face shield if splash'],admin:['Restricted access','Biohazard signage','SOPs','Spill response']},
  'BSL-2+':{eng:['Mandatory Class II BSC all procedures','Sealed centrifuge buckets','Dedicated lab area recommended'],ppe:['Double gloves','Eye protection (goggles/face shield)','Lab coat or disposable gown','N95 if aerosol risk'],admin:['Documented risk assessment','IBC/CBS approval','Operator competency verification','Direct supervision for new operators','Specific training program']},
  'BSL-2**':{eng:['Class II BSC mandatory','Contained equipment for aerosol steps'],ppe:['Double gloves','Eye protection','Lab coat'],admin:['Documented justification for enhanced RG1','Aerosol management SOP']},
  'BSL-2+/BSL-3':{eng:['Class II BSC mandatory or full BSL-3','Sealed centrifuge buckets','HEPA exhaust (BSL-3)'],ppe:['Double gloves','Eye protection','Respiratory protection','Disposable gown'],admin:['IBC approval required','Written risk assessment','Consider BSL-3 if ≥2 unfavorable factors']},
  'BSL-3':{eng:['BSL-3 facility with directional airflow','HEPA exhaust','Double-door interlocking','Class II/III BSC'],ppe:['Dedicated clothing','Double gloves','Respiratory protection','Full face shield'],admin:['Controlled entry','Medical surveillance','Comprehensive training','Emergency response plan','Incident reporting']},
  'BSL-4':{eng:['Maximum containment','Class III BSC or positive-pressure suit','Chemical shower','Double HEPA exhaust'],ppe:['Positive-pressure suit or Class III BSC','Full personal decontamination'],admin:['National-level authorization','Dedicated team','Continuous monitoring','Emergency protocols']},
};

let D={agentName:'',riskGroup:'',isGMO:false,parentalOrg:'',geneticMod:'',replComp:'',
  procedures:[{name:'',aerosol:'',volume:'',concentration:''}],
  modFactors:{},justification:'',reviewer:'',reviewDate:'',triggers:'',addControls:''};
MOD_FACTORS.forEach(f=>D.modFactors[f.id]='neutral');

function classifyPSR(a,v,c){
  const s={l:0,m:0,h:0};
  [a,v,c].forEach(x=>{if(x==='low')s.l++;else if(x==='moderate')s.m++;else if(x==='high')s.h++});
  if(s.h>=2||(s.h>=1&&s.m>=1))return'High';
  if(s.m>=2||(s.h===1&&s.l>=2))return'Moderate';
  return'Low';
}

function getEffectiveRG(){return D.isGMO&&D.replComp==='no'&&D.riskGroup==='RG3'?'RG3*':D.riskGroup}
function getProcPSRs(){return D.procedures.map(p=>p.aerosol&&p.volume&&p.concentration?classifyPSR(p.aerosol,p.volume,p.concentration):null)}
function getMaxPSR(){const psrs=getProcPSRs();const ord={Low:0,Moderate:1,High:2};return psrs.reduce((m,p)=>p&&ord[p]>ord[m]?p:m,'Low')}
function getUnfav(){return Object.values(D.modFactors).filter(v=>v==='increase').length}
function getFav(){return Object.values(D.modFactors).filter(v=>v==='decrease').length}
function getAdjustedPSR(){const mx=getMaxPSR(),u=getUnfav(),f=getFav();if(u>=2&&mx==='Low')return'Moderate';if(u>=2&&mx==='Moderate')return'High';if(f>=2&&mx==='High'&&u===0)return'Moderate';return mx}
function getBSL(){const rg=getEffectiveRG(),psr=getAdjustedPSR();return rg&&psr?BSL_MATRIX[rg]?.[psr]||'—':'—'}

function psrPill(level){const c=level==='Low'?'green':level==='Moderate'?'amber':'red';return`<span class="pill pill-${c}">${level} PSR</span>`}
function bslPill(level){const m={'BSL-1':'green','BSL-1*':'green','BSL-2':'blue','BSL-2**':'blue','BSL-2+':'amber','BSL-2+/BSL-3':'amber','BSL-3':'red','BSL-4':'purple'};return`<span class="pill pill-${m[level]||'gray'}">${level}</span>`}

function render(){
  const subs=[t('step1sub'),t('step2sub'),t('step3sub'),t('step4sub'),t('step5sub'),t('step6sub'),t('step7sub'),t('step8sub')];
  let h=`<h1>${t('title')}</h1><p class="sub">${t('subtitle')}</p>`;
  
  // Step bar
  h+=`<div class="steps-bar">`;
  for(let i=0;i<8;i++){
    const cls=i<step?'done':i===step?'active':'pending';
    h+=`<div class="step-dot ${cls}" onclick="step=${i};render()" style="cursor:pointer">${i+1}</div>`;
    if(i<7)h+=`<div class="step-line ${i<step?'done':'pending'}"></div>`;
  }
  h+=`</div>`;

  // Tabs
  h+=`<div class="tabs">`;
  t('steps').forEach((s,i)=>{h+=`<button class="tab ${i===step?'active':''}" onclick="step=${i};render()">${s}</button>`});
  h+=`</div>`;

  // Step content
  h+=`<div class="card"><h2>${t('steps')[step]}</h2><p class="sub">${subs[step]}</p>`;
  
  if(step===0) h+=renderStep1();
  else if(step===1) h+=renderStep2();
  else if(step===2) h+=renderStep3();
  else if(step===3) h+=renderStep4();
  else if(step===4) h+=renderStep5();
  else if(step===5) h+=renderStep6();
  else if(step===6) h+=renderStep7();
  else if(step===7) h+=renderStep8();

  h+=`</div>`;

  // Nav
  h+=`<div class="nav">`;
  h+=`<button class="btn btn-outline" onclick="step=Math.max(0,step-1);render()" ${step===0?'disabled':''}>${t('prev')}</button>`;
  h+=`<button class="btn btn-primary" onclick="step=Math.min(7,step+1);render()" ${step===7?'disabled':''}>${step===7?t('complete'):t('next')}</button>`;
  h+=`</div>`;

  document.getElementById('app').innerHTML=h;
}

function renderStep1(){
  let h=`<div class="field"><label class="field-label">${t('agentName')}</label>
    <input type="text" value="${esc(D.agentName)}" onchange="D.agentName=this.value" placeholder="${t('agentPh')}"></div>`;
  h+=`<div class="field"><label class="field-label">${t('rgLabel')}</label><div class="opt-grid c2">`;
  [{v:'RG1',d:'rg1d'},{v:'RG2',d:'rg2d'},{v:'RG3',d:'rg3d'},{v:'RG4',d:'rg4d'}].forEach(r=>{
    h+=`<button class="opt ${D.riskGroup===r.v?'selected':''}" onclick="D.riskGroup='${r.v}';render()">
      <div class="opt-label">${r.v}</div><div class="opt-desc">${t(r.d)}</div></button>`;
  });
  h+=`</div></div>`;
  h+=`<div class="field"><label class="check-label"><input type="checkbox" ${D.isGMO?'checked':''} onchange="D.isGMO=this.checked;render()"> ${t('isGMO')}</label></div>`;
  if(D.isGMO){
    h+=`<div style="padding:16px;background:var(--bg2);border-radius:var(--radius);margin-top:8px">`;
    h+=`<div class="field"><label class="field-label">${t('parentalOrg')}</label><input type="text" value="${esc(D.parentalOrg)}" onchange="D.parentalOrg=this.value"></div>`;
    h+=`<div class="field"><label class="field-label">${t('geneticMod')}</label><input type="text" value="${esc(D.geneticMod)}" onchange="D.geneticMod=this.value"></div>`;
    h+=`<div class="field"><label class="field-label">${t('replComp')}</label><div class="opt-grid c2">`;
    [{v:'yes',l:'replCompetent'},{v:'no',l:'replDefective'}].forEach(r=>{
      h+=`<button class="opt ${D.replComp===r.v?'selected':''}" onclick="D.replComp='${r.v}';render()"><div class="opt-label">${t(r.l)}</div></button>`;
    });
    h+=`</div></div>`;
    if(D.replComp==='no'&&D.riskGroup==='RG3') h+=`<div class="note note-teal">${t('rg3star')}</div>`;
    h+=`</div>`;
  }
  return h;
}

function renderStep2(){
  let h='';
  D.procedures.forEach((p,i)=>{
    h+=`<div class="proc-block"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-weight:500">${t('procedure')} ${i+1}</span>`;
    if(D.procedures.length>1)h+=`<button style="font-size:12px;color:var(--red-text);background:none;border:none;cursor:pointer" onclick="D.procedures.splice(${i},1);render()">${t('remove')}</button>`;
    h+=`</div>`;
    h+=`<div class="field"><label class="field-label">${t('procName')}</label><input type="text" value="${esc(p.name)}" onchange="D.procedures[${i}].name=this.value" placeholder="${t('procPh')}"></div>`;
    h+=radioGroup(t('aerosol'),[{v:'low',l:t('aeroLow')},{v:'moderate',l:t('aeroMod')},{v:'high',l:t('aeroHigh')}],p.aerosol,`D.procedures[${i}].aerosol`,3);
    h+=radioGroup(t('volume'),[{v:'low',l:'<10 mL'},{v:'moderate',l:'10–100 mL'},{v:'high',l:'>100 mL'}],p.volume,`D.procedures[${i}].volume`,3);
    h+=radioGroup(t('conc'),[{v:'low',l:'<10⁶'},{v:'moderate',l:'10⁶–10⁸'},{v:'high',l:'>10⁸'}],p.concentration,`D.procedures[${i}].concentration`,3);
    h+=`</div>`;
  });
  h+=`<button class="btn btn-outline" style="width:100%;border-style:dashed" onclick="D.procedures.push({name:'',aerosol:'',volume:'',concentration:''});render()">${t('addProc')}</button>`;
  return h;
}

function renderStep3(){
  const psrs=getProcPSRs();
  let h=`<div style="display:flex;flex-direction:column;gap:8px">`;
  D.procedures.forEach((p,i)=>{
    if(!p.name)return;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border-radius:var(--radius)">
      <span>${esc(p.name)}</span>${psrs[i]?psrPill(psrs[i]):`<span class="pill pill-gray">${t('incomplete')}</span>`}</div>`;
  });
  h+=`</div>`;
  h+=`<div class="note note-purple"><strong>${t('maxPSR')}:</strong> ${psrPill(getMaxPSR())}<div style="margin-top:6px;font-size:12px">${t('maxPSRnote')}</div></div>`;
  return h;
}

function renderStep4(){
  let h='';
  MOD_FACTORS.forEach(f=>{
    const val=D.modFactors[f.id];
    h+=`<div class="mod-row"><span style="font-size:12px;font-weight:500">${f[lang]}</span><div class="mod-opts">`;
    [{v:'decrease',l:t('favorable'),d:f.dec[lang],cls:'sel-fav'},{v:'neutral',l:t('neutral'),d:f.neu[lang],cls:''},{v:'increase',l:t('unfavorable'),d:f.inc[lang],cls:'sel-unfav'}].forEach(o=>{
      h+=`<button class="mod-opt ${val===o.v?'selected ':''} ${val===o.v?o.cls:''}" onclick="D.modFactors.${f.id}='${o.v}';render()">
        <div style="font-weight:500;font-size:11px">${o.l}</div><div style="font-size:9px;opacity:.7;margin-top:2px">${o.d}</div></button>`;
    });
    h+=`</div></div>`;
  });
  const u=getUnfav(),f=getFav();
  h+=`<div style="display:flex;gap:12px;margin-top:16px">
    <div class="metric" ${u>=2?'style="background:var(--red-bg)"':''}><div class="metric-val" ${u>=2?'style="color:var(--red-text)"':''}>${u}</div><div class="metric-label">${t('unfavCount')}</div></div>
    <div class="metric"><div class="metric-val">${f}</div><div class="metric-label">${t('favCount')}</div></div></div>`;
  if(u>=2)h+=`<div class="note note-red">${t('escalation')} (${getMaxPSR()} → ${getAdjustedPSR()} PSR)</div>`;
  return h;
}

function renderStep5(){
  const erg=getEffectiveRG(),apsr=getAdjustedPSR();
  let h=`<div style="overflow-x:auto"><table class="matrix"><thead><tr><th style="text-align:left">${t('riskGroup')}</th><th>Low PSR</th><th>Moderate PSR</th><th>High PSR</th></tr></thead><tbody>`;
  Object.entries(BSL_MATRIX).forEach(([rg,psrs])=>{
    h+=`<tr><td>${rg}</td>`;
    ['Low','Moderate','High'].forEach(p=>{
      const active=rg===erg&&p===apsr;
      h+=`<td ${active?'class="active-cell"':''}>${psrs[p]}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  h+=`<div class="integration"><div style="font-size:13px;margin-bottom:8px">${t('integResult')}</div>
    <div class="eq"><span class="pill pill-gray">${erg||'—'}</span><span>×</span>${psrPill(apsr)}<span>=</span>${bslPill(getBSL())}</div></div>`;
  return h;
}

function renderStep6(){
  const bsl=getBSL(),erg=getEffectiveRG();
  let h=`<div class="result-big"><div style="font-size:14px;color:var(--text2);margin-bottom:8px">${t('assignedBSL')}</div>
    <div class="bsl">${bsl}</div>
    <div style="margin-top:12px"><span class="pill pill-gray">${esc(D.agentName)||'—'}</span> · <span class="pill pill-gray">${erg}</span> · ${psrPill(getAdjustedPSR())}</div></div>`;
  if(erg==='RG3*'&&bsl.includes('BSL-2+'))h+=`<div class="note note-amber">${t('rg3starCond')}</div>`;
  h+=`<div class="field" style="margin-top:16px"><label class="field-label">${t('justification')}</label>
    <textarea rows="5" onchange="D.justification=this.value" placeholder="${t('justPh')}">${esc(D.justification)}</textarea></div>`;
  return h;
}

function renderStep7(){
  const bsl=getBSL(),ctrl=CONTROLS[bsl]||CONTROLS['BSL-2'];
  let h=`<p style="font-size:13px;color:var(--text2);margin-bottom:16px">${t('recControls')} ${bslPill(bsl)}</p>`;
  [{k:'eng',t:t('engControls')},{k:'ppe',t:t('ppeControls')},{k:'admin',t:t('adminControls')}].forEach(s=>{
    h+=`<div style="margin-bottom:16px"><div style="font-size:14px;font-weight:500;margin-bottom:8px">${s.t}</div>`;
    (ctrl[s.k]||[]).forEach(item=>{h+=`<label class="check-label" style="margin-bottom:4px"><input type="checkbox" checked> ${item}</label>`});
    h+=`</div>`;
  });
  h+=`<div class="field"><label class="field-label">${t('addControls')}</label><textarea rows="3" onchange="D.addControls=this.value" placeholder="${t('addControlsPh')}">${esc(D.addControls)}</textarea></div>`;
  return h;
}

function renderStep8(){
  const psrs=getProcPSRs(),bsl=getBSL(),erg=getEffectiveRG();
  let h=`<div class="field"><label class="field-label">${t('assessor')}</label><input type="text" value="${esc(D.reviewer)}" onchange="D.reviewer=this.value"></div>`;
  h+=`<div class="field"><label class="field-label">${t('assessDate')}</label><input type="date" value="${esc(D.reviewDate)}" onchange="D.reviewDate=this.value"></div>`;
  h+=`<div class="field"><label class="field-label">${t('triggers')}</label><textarea rows="3" onchange="D.triggers=this.value" placeholder="${t('triggersPh')}">${esc(D.triggers)}</textarea></div>`;
  
  h+=`<div style="margin-top:20px;padding:20px;background:var(--bg2);border-radius:var(--radius-lg)">
    <div style="font-size:16px;font-weight:600;margin-bottom:14px">${t('summary')}</div>
    <div class="summary-grid">
      <div><span class="lbl">${t('agent')}:</span> ${esc(D.agentName)||'—'}</div>
      <div><span class="lbl">${t('riskGroup')}:</span> ${erg||'—'}</div>
      <div><span class="lbl">${t('maxPSR')}:</span> ${psrPill(getMaxPSR())}</div>
      <div><span class="lbl">${t('adjustedPSR')}:</span> ${psrPill(getAdjustedPSR())}</div>
      <div><span class="lbl">${t('bslAssigned')}:</span> ${bslPill(bsl)}</div>
      <div><span class="lbl">${t('unfavFactors')}:</span> ${getUnfav()}</div>
    </div>
    <div style="margin-top:12px;font-size:13px"><span class="lbl">${t('procsEval')}:</span>`;
  D.procedures.filter(p=>p.name).forEach((p,i)=>{
    h+=`<div style="display:flex;justify-content:space-between;padding:4px 0">${esc(p.name)} ${psrs[i]?psrPill(psrs[i]):''}</div>`;
  });
  h+=`</div>`;
  if(D.justification)h+=`<div style="margin-top:12px;font-size:13px"><span class="lbl">${t('justification')}:</span><div style="margin-top:4px;font-style:italic">${esc(D.justification)}</div></div>`;
  h+=`</div>`;

  h+=`<button class="btn btn-export" onclick="exportReport()">${t('exportTXT')}</button>`;
  h+=`<button class="btn btn-export" style="background:var(--accent);margin-top:8px" onclick="window.print()">${t('exportPDF')} (Print)</button>`;
  return h;
}

function radioGroup(label,options,val,path,cols){
  let h=`<div class="field"><label class="field-label">${label}</label><div class="opt-grid c${cols}">`;
  options.forEach(o=>{
    h+=`<button class="opt ${val===o.v?'selected':''}" onclick="${path}='${o.v}';render()"><div class="opt-label">${o.l}</div>${o.d?`<div class="opt-desc">${o.d}</div>`:''}</button>`;
  });
  return h+`</div></div>`;
}

function exportReport(){
  const psrs=getProcPSRs(),bsl=getBSL(),erg=getEffectiveRG();
  let r=`PSR BIOSAFETY ASSESSMENT REPORT\n${'='.repeat(40)}\n\n`;
  r+=`Agent: ${D.agentName}\nRisk Group: ${erg}\n`;
  if(D.isGMO)r+=`GMO: Yes | Parental: ${D.parentalOrg} | Modification: ${D.geneticMod} | Replication: ${D.replComp}\n`;
  r+=`\nPROCEDURES:\n`;
  D.procedures.filter(p=>p.name).forEach((p,i)=>{r+=`  ${i+1}. ${p.name} → ${psrs[i]||'N/A'} PSR (Aerosol: ${p.aerosol}, Vol: ${p.volume}, Conc: ${p.concentration})\n`});
  r+=`\nMax PSR: ${getMaxPSR()}\nAdjusted PSR: ${getAdjustedPSR()} (Unfavorable: ${getUnfav()}, Favorable: ${getFav()})\n`;
  r+=`\nBSL ASSIGNMENT: ${bsl}\n`;
  r+=`\nJustification: ${D.justification||'(not provided)'}\n`;
  r+=`\nMODULATING FACTORS:\n`;
  MOD_FACTORS.forEach(f=>{r+=`  ${f.en}: ${D.modFactors[f.id]}\n`});
  r+=`\nAssessor: ${D.reviewer||'(not provided)'}\nDate: ${D.reviewDate||'(not provided)'}\nReview triggers: ${D.triggers||'(not provided)'}\n`;
  r+=`\n${'='.repeat(40)}\nGenerated by PSR Biosafety Assessment Tool\nBased on: Procedure-Specific Risk (PSR) Framework\nRef: Front. Bioeng. Biotechnol. – Biosafety and Biosecurity\n`;
  
  const blob=new Blob([r],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`PSR_Assessment_${(D.agentName||'report').replace(/\s+/g,'_')}_${D.reviewDate||'undated'}.txt`;
  a.click();URL.revokeObjectURL(a.href);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toggleLang(){lang=lang==='en'?'es':'en';document.getElementById('langBtn').textContent=lang==='en'?'ES':'EN';render()}

render();
</script>
</body>
</html>
